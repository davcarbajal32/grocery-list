<!DOCTYPE html>
<html>
<head>
    <title>David's Quick Calculator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.15);
            width: 500px;
            text-align: center;
        }

        h2 {
            margin-bottom: 25px;
        }

        input, select {
            width: 95%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 95%;
            padding: 12px;
            background-color: #6a0dad;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #5a0099;
        }

        .result {
            margin-top: 20px;
            font-weight: bold;
            font-size: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Welcome to David Carbajal's Quick Calculator</h2>

        <form method="POST" action="/calculator">
            <input type="text" name="num1" placeholder="Enter first number">
            <input type="text" name="num2" placeholder="Enter second number">

            <select name="op">
                <option value="1">Add</option>
                <option value="2">Subtract</option>
                <option value="3">Multiply</option>
                <option value="4">Divide</option>
            </select>

            <button type="submit">Calculate</button>
        </form>

        {% if result is not none %}
            <div class="result">
                Result: {{ result }}
            </div>
        {% endif %}
    </div>
</body>
</html>

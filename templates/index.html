<!DOCTYPE html>
<html>
<head>
    <title>Grocery List</title>

    <style>
        body {
            background-color: black;
            color: #d8b4ff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            width: 500px;
        }

        h1 {
            margin-bottom: 25px;
        }

        input, button {
            padding: 8px;
            margin: 5px;
            font-size: 14px;
        }

        ul {
            list-style-type: none;
            padding: 0;
            margin-top: 20px;
            font-size: 18px;
        }

        li {
            margin-bottom: 15px;
        }

        button {
            background-color: #a855f7;
            border: none;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #9333ea;
        }
    </style>
</head>

<body>
    <div class="container">

        <h1>Welcome to David Carbajals Grocery List Application</h1>

        <form action="/add" method="POST">
            <input type="text" name="item" placeholder="Item name">
            <input type="number" name="quantity" placeholder="Quantity" min="1">
            <button type="submit">Add</button>
        </form>

        <ul>
            {% for item in items %}
                <li>
                    {{ item.name }} - Quantity: {{ item.quantity }}

                    <form action="/update/{{ item._id }}" method="POST">
                        <input type="number" name="quantity" min="1" placeholder="New quantity">
                        <button type="submit">Update</button>
                    </form>

                    <form action="/delete/{{ item._id }}" method="POST">
                        <button type="submit">Remove</button>
                    </form>
                </li>
            {% endfor %}
        </ul>

    </div>
</body>
</html>
